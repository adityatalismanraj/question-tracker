<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Shake Torch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000;
    color: #fff;
    user-select: none;
  }

  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }

  #app.torch-on {
    background: #fff;
    color: #000;
  }

  /* Full-screen white flash overlay for visual fallback */
  #flash-overlay {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 2rem;
    text-align: center;
  }

  .icon-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }

  #app.torch-on .icon-ring {
    border-color: rgba(0,0,0,0.15);
    background: rgba(0,0,0,0.04);
  }

  .icon-ring svg {
    width: 72px;
    height: 72px;
    transition: fill 0.2s, opacity 0.2s;
  }

  .status-text {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.5;
    transition: color 0.2s, opacity 0.2s;
  }

  #app.torch-on .status-text { color: #000; }

  .hint {
    font-size: 13px;
    opacity: 0.35;
    line-height: 1.6;
    max-width: 240px;
    transition: color 0.2s;
  }

  #app.torch-on .hint { color: #000; }

  /* iOS permission button */
  #permission-btn {
    display: none;
    padding: 14px 32px;
    border-radius: 50px;
    border: 1.5px solid rgba(255,255,255,0.4);
    background: transparent;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s;
  }

  #permission-btn:active { background: rgba(255,255,255,0.1); }

  /* Shake ripple animation */
  @keyframes ripple {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  .ripple {
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    animation: ripple 0.5s ease-out forwards;
    pointer-events: none;
  }

  #app.torch-on .ripple { border-color: rgba(0,0,0,0.2); }

  /* Mode badge */
  .mode-badge {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.25;
    white-space: nowrap;
    transition: color 0.2s;
  }

  #app.torch-on .mode-badge { color: #000; }
</style>
</head>
<body>
<div id="app">
  <div id="flash-overlay"></div>

  <div class="content">
    <div class="icon-ring" id="toggle-btn" role="button" aria-label="Toggle torch" tabindex="0">
      <svg viewBox="0 0 24 24" id="torch-icon" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <!-- Flashlight / torch icon -->
        <path d="M9 2h6l1 6H8L9 2z" opacity="0.9"/>
        <path d="M8 8h8l-1 3H9L8 8z" opacity="0.7"/>
        <path d="M9 11h6l3 9H6l3-9z" opacity="0.85"/>
        <rect x="10.5" y="15" width="3" height="4" rx="0.5" fill="rgba(0,0,0,0.35)"/>
      </svg>
    </div>

    <div class="status-text" id="status-text">Off</div>

    <div class="hint" id="hint-text">
      Shake your phone or tap the icon to toggle the torch
    </div>

    <button id="permission-btn">Enable shake detection</button>
  </div>

  <div class="mode-badge" id="mode-badge">visual mode</div>
</div>

<script>
(function() {
  const app        = document.getElementById('app');
  const toggleBtn  = document.getElementById('toggle-btn');
  const statusText = document.getElementById('status-text');
  const hintText   = document.getElementById('hint-text');
  const permBtn    = document.getElementById('permission-btn');
  const modeBadge  = document.getElementById('mode-badge');
  const overlay    = document.getElementById('flash-overlay');

  let torchOn      = false;
  let torchStream  = null;
  let torchTrack   = null;
  let useRealTorch = false;
  let motionReady  = false;

  /* ---- Wake Lock: keep screen on while torch is active ---- */
  let wakeLock = null;

  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch(e) { /* denied or unavailable */ }
  }

  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  }

  /* Re-acquire wake lock when tab becomes visible again (OS can release it on tab switch) */
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && torchOn) {
      await acquireWakeLock();
      /* Also re-apply torch — camera track may have been paused by browser */
      if (useRealTorch && torchTrack) {
        try { await torchTrack.applyConstraints({ advanced: [{ torch: true }] }); }
        catch(e) { /* track died, rebuild */ await rebuildTorch(); }
      }
    }
  });

  /* ---- Silent audio keepalive (helps prevent JS suspension on some browsers) ---- */
  let audioCtx = null;

  function startSilentAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const buf  = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
      const src  = audioCtx.createBufferSource();
      src.buffer = buf;
      src.loop   = true;
      src.connect(audioCtx.destination);
      src.start(0);
    } catch(e) {}
  }

  function stopSilentAudio() {
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
  }

  /* ---- Rebuild torch track if it got dropped ---- */
  async function rebuildTorch() {
    try {
      if (torchStream) torchStream.getTracks().forEach(t => t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      const track  = stream.getVideoTracks()[0];
      const caps   = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.torch) {
        torchStream  = stream;
        torchTrack   = track;
        useRealTorch = true;
        await torchTrack.applyConstraints({ advanced: [{ torch: true }] });
      }
    } catch(e) {}
  }

  /* ---- Shake detection ---- */
  let lastAcc = null;
  let shakeLastTime = 0;
  const SHAKE_THRESHOLD = 18;
  const SHAKE_COOLDOWN  = 600;

  function onMotion(e) {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;
    const now = Date.now();
    if (lastAcc) {
      const dx = Math.abs(acc.x - lastAcc.x);
      const dy = Math.abs(acc.y - lastAcc.y);
      const dz = Math.abs(acc.z - lastAcc.z);
      const delta = dx + dy + dz;
      if (delta > SHAKE_THRESHOLD && (now - shakeLastTime) > SHAKE_COOLDOWN) {
        shakeLastTime = now;
        toggleTorch();
      }
    }
    lastAcc = { x: acc.x, y: acc.y, z: acc.z };
  }

  function enableMotion() {
    window.addEventListener('devicemotion', onMotion, { passive: true });
    motionReady = true;
    permBtn.style.display = 'none';
    hintText.textContent  = 'Shake your phone or tap the icon to toggle the torch';
  }

  /* iOS 13+ requires explicit permission */
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    permBtn.style.display = 'block';
    hintText.textContent  = 'Tap the button below to enable shake detection';
    permBtn.addEventListener('click', () => {
      DeviceMotionEvent.requestPermission()
        .then(state => { if (state === 'granted') enableMotion(); })
        .catch(console.error);
    });
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    enableMotion();
  }

  /* ---- Real camera torch ---- */
  async function initTorch() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      const track = stream.getVideoTracks()[0];
      const caps  = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.torch) {
        torchStream  = stream;
        torchTrack   = track;
        useRealTorch = true;
        modeBadge.textContent = 'real torch';
      } else {
        stream.getTracks().forEach(t => t.stop());
      }
    } catch (e) {
      /* Camera unavailable — visual fallback */
    }
  }

  /* ---- Toggle ---- */
  function triggerRipple() {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.position = 'absolute';
    toggleBtn.style.position = 'relative';
    toggleBtn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  async function setTorch(on) {
    if (useRealTorch && torchTrack) {
      try { await torchTrack.applyConstraints({ advanced: [{ torch: on }] }); }
      catch(e) { useRealTorch = false; }
    }
    if (!useRealTorch) {
      overlay.style.opacity = on ? '1' : '0';
    }
    app.classList.toggle('torch-on', on);
    statusText.textContent = on ? 'On' : 'Off';

    if (on) {
      await acquireWakeLock();
      startSilentAudio();
    } else {
      releaseWakeLock();
      stopSilentAudio();
    }
  }

  async function toggleTorch() {
    torchOn = !torchOn;
    triggerRipple();
    await setTorch(torchOn);
    if ('vibrate' in navigator) navigator.vibrate(40);
  }

  /* ---- UI events ---- */
  toggleBtn.addEventListener('click', toggleTorch);
  toggleBtn.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleTorch(); }
  });

  /* ---- Init ---- */
  initTorch();
})();
</script>
</body>
</html>
