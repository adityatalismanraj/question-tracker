<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --muted:     #2a2a3c;
      --text:      #e8e8f0;
      --sub:       #5a5a7a;
      --phy:       #00d4ff;
      --chem:      #ff6b35;
      --math:      #a8ff3e;
      --phy-glow:  rgba(0,212,255,.18);
      --chem-glow: rgba(255,107,53,.18);
      --math-glow: rgba(168,255,62,.18);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
      opacity: .6;
    }

    /* ── Grid lines ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
      opacity: .35;
    }

    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 72px;
      animation: fadeUp .7s ease both;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 9vw, 96px);
      line-height: .95;
      letter-spacing: .04em;
      background: linear-gradient(135deg, #fff 30%, var(--sub));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 16px;
      font-size: 14px;
      color: var(--sub);
      font-weight: 400;
      letter-spacing: .04em;
    }

    /* ── Cards grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 980px;
    }

    /* ── Card ── */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow: hidden;
      animation: fadeUp .7s ease both;
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .card:nth-child(2) { animation-delay: .12s; }
    .card:nth-child(3) { animation-delay: .24s; }

    .card:hover { transform: translateY(-4px); }

    /* Accent corner glow */
    .card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 180px; height: 180px;
      border-radius: 50%;
      filter: blur(60px);
      opacity: .45;
      transition: opacity .3s;
    }
    .card:hover::before { opacity: .7; }

    .card.phy { box-shadow: 0 0 0 1px var(--border), 0 24px 60px rgba(0,0,0,.5); }
    .card.phy::before { background: var(--phy); }
    .card.phy:hover { box-shadow: 0 0 0 1px var(--phy), 0 24px 60px rgba(0,0,0,.5), 0 0 40px var(--phy-glow); }

    .card.chem::before { background: var(--chem); }
    .card.chem:hover { box-shadow: 0 0 0 1px var(--chem), 0 24px 60px rgba(0,0,0,.5), 0 0 40px var(--chem-glow); }

    .card.math::before { background: var(--math); }
    .card.math:hover { box-shadow: 0 0 0 1px var(--math), 0 24px 60px rgba(0,0,0,.5), 0 0 40px var(--math-glow); }

    /* ── Card top row ── */
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: .07em;
    }
    .card.phy  .label { color: var(--phy); }
    .card.chem .label { color: var(--chem); }
    .card.math .label { color: var(--math); }

    .icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px;
      opacity: .9;
    }
    .card.phy  .icon { background: var(--phy-glow);  border: 1px solid rgba(0,212,255,.2); }
    .card.chem .icon { background: var(--chem-glow); border: 1px solid rgba(255,107,53,.2); }
    .card.math .icon { background: var(--math-glow); border: 1px solid rgba(168,255,62,.2); }

    /* ── Counter number ── */
    .counter-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 88px;
      line-height: 1;
      letter-spacing: -.02em;
      transition: transform .12s cubic-bezier(.34,1.56,.64,1), color .12s;
    }
    .card.phy  .count { color: var(--phy); }
    .card.chem .count { color: var(--chem); }
    .card.math .count { color: var(--math); }

    .count.pop {
      transform: scale(1.18);
    }

    .unit {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--sub);
      letter-spacing: .1em;
    }

    /* ── Progress bar ── */
    .bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--sub);
      letter-spacing: .05em;
    }

    .bar-bg {
      height: 4px;
      background: var(--muted);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }
    .card.phy  .bar-fill { background: linear-gradient(90deg, var(--phy), #006bff); }
    .card.chem .bar-fill { background: linear-gradient(90deg, var(--chem), #ff0080); }
    .card.math .bar-fill { background: linear-gradient(90deg, var(--math), #00ff9f); }

    /* ── +1 Button ── */
    .btn {
      position: relative;
      width: 100%;
      padding: 18px 0;
      border: none;
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: .12em;
      cursor: pointer;
      overflow: hidden;
      transition: transform .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.08);
      opacity: 0;
      transition: opacity .2s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:active { transform: scale(.97); }

    .card.phy  .btn { background: linear-gradient(135deg, rgba(0,212,255,.2), rgba(0,107,255,.2)); color: var(--phy);  border: 1px solid rgba(0,212,255,.35); box-shadow: 0 0 30px rgba(0,212,255,.1); }
    .card.chem .btn { background: linear-gradient(135deg, rgba(255,107,53,.2), rgba(255,0,128,.2)); color: var(--chem); border: 1px solid rgba(255,107,53,.35); box-shadow: 0 0 30px rgba(255,107,53,.1); }
    .card.math .btn { background: linear-gradient(135deg, rgba(168,255,62,.2), rgba(0,255,159,.2)); color: var(--math); border: 1px solid rgba(168,255,62,.35); box-shadow: 0 0 30px rgba(168,255,62,.1); }

    .card.phy  .btn:hover { box-shadow: 0 0 40px rgba(0,212,255,.3); }
    .card.chem .btn:hover { box-shadow: 0 0 40px rgba(255,107,53,.3); }
    .card.math .btn:hover { box-shadow: 0 0 40px rgba(168,255,62,.3); }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple .55s linear;
      pointer-events: none;
      opacity: .35;
    }
    .card.phy  .ripple { background: var(--phy); }
    .card.chem .ripple { background: var(--chem); }
    .card.math .ripple { background: var(--math); }

    /* ── Total strip ── */
    .total-strip {
      margin-top: 52px;
      width: 100%;
      max-width: 980px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      animation: fadeUp .7s .36s ease both;
    }

    .total-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .total-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: .04em;
      background: linear-gradient(90deg, var(--phy), var(--chem), var(--math));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .streak {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--sub);
    }
    .streak span {
      color: var(--math);
      font-weight: 500;
    }

    /* ── Reset ── */
    .reset-btn {
      background: none;
      border: 1px solid var(--muted);
      color: var(--sub);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .reset-btn:hover { border-color: var(--text); color: var(--text); }

    /* ── Footer ── */
    footer {
      margin-top: 60px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--sub);
      letter-spacing: .1em;
      animation: fadeUp .7s .5s ease both;
    }

    /* ── Floating +1 ── */
    .float-label {
      position: fixed;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transform: translateY(0);
      transition: none;
    }
    .float-label.active {
      animation: floatUp .7s ease forwards;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0)     scale(1); }
      100% { opacity: 0; transform: translateY(-70px) scale(1.3); }
    }

    @media (max-width: 480px) {
      .count { font-size: 72px; }
      .total-strip { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <p class="eyebrow">/ daily study tracker /</p>
    <h1>Questions<br>Solved</h1>
    <p class="subtitle">Track every question. Own the grind.</p>
  </header>

  <div class="cards">

    <!-- Physics -->
    <div class="card phy">
      <div class="card-head">
        <span class="label">Physics</span>
        <div class="icon">⚡</div>
      </div>
      <div class="counter-wrap">
        <div class="count" id="phy-count">0</div>
        <span class="unit">QS</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-meta">
          <span>Progress</span>
          <span id="phy-pct">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="phy-bar"></div></div>
      </div>
      <button class="btn" id="phy-btn" onclick="increment('phy', event)">+ ADD QUESTION</button>
    </div>

    <!-- Chemistry -->
    <div class="card chem">
      <div class="card-head">
        <span class="label">Chemistry</span>
        <div class="icon">🧪</div>
      </div>
      <div class="counter-wrap">
        <div class="count" id="chem-count">0</div>
        <span class="unit">QS</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-meta">
          <span>Progress</span>
          <span id="chem-pct">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="chem-bar"></div></div>
      </div>
      <button class="btn" id="chem-btn" onclick="increment('chem', event)">+ ADD QUESTION</button>
    </div>

    <!-- Math -->
    <div class="card math">
      <div class="card-head">
        <span class="label">Mathematics</span>
        <div class="icon">∑</div>
      </div>
      <div class="counter-wrap">
        <div class="count" id="math-count">0</div>
        <span class="unit">QS</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-meta">
          <span>Progress</span>
          <span id="math-pct">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="math-bar"></div></div>
      </div>
      <button class="btn" id="math-btn" onclick="increment('math', event)">+ ADD QUESTION</button>
    </div>

  </div>

  <!-- Total strip -->
  <div class="total-strip">
    <div>
      <p class="total-label">Total Questions Today</p>
      <div class="total-num" id="total">0</div>
    </div>
    <div class="streak">Daily goal: <span id="goal-pct">0%</span> of 100 questions</div>
    <button class="reset-btn" onclick="resetAll()">Reset Day</button>
  </div>

  <footer>Keep pushing — consistency beats intensity.</footer>

</div>

<!-- Floating label container -->
<div class="float-label" id="float-label">+1</div>

<script>
  const state = { phy: 0, chem: 0, math: 0 };
  const GOAL = 100;
  const colors = { phy: '#00d4ff', chem: '#ff6b35', math: '#a8ff3e' };

  function increment(sub, e) {
    state[sub]++;
    updateCard(sub);
    updateTotal();
    popAnimation(sub);
    createRipple(e, sub);
    showFloat(e, sub);
  }

  function updateCard(sub) {
    const el = document.getElementById(sub + '-count');
    el.textContent = state[sub];

    const pct = Math.min((state[sub] / 30) * 100, 100); // bar fills at 30
    document.getElementById(sub + '-bar').style.width = pct + '%';
    document.getElementById(sub + '-pct').textContent = Math.round(pct) + '%';
  }

  function updateTotal() {
    const tot = state.phy + state.chem + state.math;
    document.getElementById('total').textContent = tot;
    document.getElementById('goal-pct').textContent = Math.min(Math.round((tot / GOAL) * 100), 100) + '%';
  }

  function popAnimation(sub) {
    const el = document.getElementById(sub + '-count');
    el.classList.remove('pop');
    void el.offsetWidth; // reflow
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 200);
  }

  function createRipple(e, sub) {
    const btn = document.getElementById(sub + '-btn');
    const circle = document.createElement('span');
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top  - size / 2;
    circle.className = 'ripple';
    circle.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
    btn.appendChild(circle);
    setTimeout(() => circle.remove(), 600);
  }

  function showFloat(e, sub) {
    const fl = document.getElementById('float-label');
    fl.style.color = colors[sub];
    fl.style.left = (e.clientX - 14) + 'px';
    fl.style.top  = (e.clientY - 14) + 'px';
    fl.classList.remove('active');
    void fl.offsetWidth;
    fl.classList.add('active');
  }

  function resetAll() {
    if (!confirm('Reset today\'s counts?')) return;
    state.phy = state.chem = state.math = 0;
    ['phy','chem','math'].forEach(s => updateCard(s));
    updateTotal();
  }
</script>
</body>
</html>
